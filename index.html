<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자기야,❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
    background: linear-gradient(to bottom, #FFECEF, #FFF7FA);
    font-family: 'Gaegu', cursive;
}

/* 떠다니는 하트 배경 효과 */
.hearts {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
}

.heart {
    position: absolute;
    bottom: -50px;
    /* [수정] 하트가 선명하게 돋보이도록 불투명도를 100% 꽉 채운 순수 흰색으로 변경 */
    color: #FFFFFF;
    font-weight: bold;
    animation: floating linear infinite;
    /* [수정] 흰색 하트 주위로 핑크빛 네온 조명 효과를 더 넓고 진하게 강화 */
    text-shadow:
        0 0 8px rgba(255, 255, 255, 1),
        0 0 15px rgba(255, 182, 193, 0.9),
        0 0 30px rgba(255, 105, 180, 0.6);
}

@keyframes floating {
    0% {
        transform: translateY(0) translateX(0) scale(0.8);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    50% {
        transform: translateY(-50vh) translateX(25px) scale(1.1);
    }
    100% {
        transform: translateY(-120vh) translateX(-25px) scale(1.3);
        opacity: 0;
    }
}

/* 메인 컨테이너 */
.container {
    position: relative;
    z-index: 1;
    display: flex;
    min-height: 100vh;
    padding: 40px;
    box-sizing: border-box;
}

/* 왼쪽: 사진 구역 */
.left {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.6));
}

.left img {
    width: 90%;
    max-height: 80vh;
    border-radius: 24px;
    object-fit: cover;
    filter: none;

    -webkit-mask-image: 
        linear-gradient(to top, transparent 0%, black 8%, black 92%, transparent 100%),
        linear-gradient(to left, transparent 0%, black 8%, black 92%, transparent 100%);
    -webkit-mask-composite: destination-in;
    
    mask-image: 
        linear-gradient(to top, transparent 0%, black 8%, black 92%, transparent 100%),
        linear-gradient(to left, transparent 0%, black 8%, black 92%, transparent 100%);
    mask-composite: intersect;
}

/* 오른쪽: 편지 글 구역 */
.right {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    font-size: clamp(18px, 3.7vw, 28px);
    line-height: 2.1;
    color: #E48AA3;
    font-weight: bold;
    text-shadow:
        0 0 8px rgba(255,255,255,0.8),
        0 0 18px rgba(255,192,203,0.5);
}

/* 편지 제목 스타일 */
.title {
    font-size: clamp(34px, 6vw, 60px);
    color: #FF8FB1;
    margin-bottom: 24px;
    letter-spacing: 0.15em;
    text-shadow:
        0 0 12px rgba(255,255,255,0.9),
        0 0 24px rgba(255,182,193,0.8);
}

/* 모바일 화면 대응 (반응형) */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        padding: 18px;
    }
    .left, .right {
        width: 100%;
    }
    .left {
        margin-bottom: 24px;
    }
    .left img {
        width: 100%;
        max-height: 50vh;
    }
    .right {
        font-size: 22px;
    }
}
</style>
</head>

<body>

<!-- 배경에 떠다니는 하트들 (모바일 컬러 변형을 방지하면서 속이 꽉 찬 흰색 웹 표준 특수기호 적용) -->
<div class="hearts">
    <div class="heart" style="left:5%; font-size:22px; animation-duration:8s;">&#10084;</div>
    <div class="heart" style="left:15%; font-size:18px; animation-duration:11s;">&#10084;</div>
    <div class="heart" style="left:28%; font-size:26px; animation-duration:9s;">&#10084;</div>
    <div class="heart" style="left:40%; font-size:16px; animation-duration:13s;">&#10084;</div>
    <div class="heart" style="left:53%; font-size:30px; animation-duration:10s;">&#10084;</div>
    <div class="heart" style="left:66%; font-size:20px; animation-duration:12s;">&#10084;</div>
    <div class="heart" style="left:76%; font-size:24px; animation-duration:9s;">&#10084;</div>
    <div class="heart" style="left:88%; font-size:18px; animation-duration:14s;">&#10084;</div>
</div>

<div class="container">

    <!-- 왼쪽: 사진 구역 -->
    <div class="left">
        <img src="https://github.com/namankum/grace/blob/main/grace.jpg?raw=true" alt="Grace">
    </div>

    <!-- 오른쪽: 편지 내용 구역 -->
    <div class="right">
        <div class="title">자기야,❤️</div>
        
        요즘 누구보다 열심히 공연하고<br>
        스케줄 끝내는거 내가 제일 잘 알아요.<br><br>
        
        그러니 가끔 지치고 힘든 날도 있겠지만<br>
        자기 옆에는 항상 내가 있다는 거<br>
        잊지 않았으면 좋겠어요.<br><br>
        
        결과보다도 지금까지 잘 버텨온 자기 자체가<br>
        정말 멋있고 자랑스러워요.<br><br>
        
        오늘도 내일도 매일매일<br>
        자기답게 잘 해낼 거라고 믿고<br>
        많이 응원하고 있어요.<br><br>
        
        사랑해요❤️<br>
        내가 사랑한다는거 잊지 마요❤️<br>
        사랑해요❤️
    </div>

</div>

</body>
</html>
